<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Management - Athikkramana</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #2563EB;
            --primary-dark: #1E40AF;
            --secondary: #64748B;
            --accent: #F59E0B;
            --success: #10B981;
            --danger: #EF4444;
            --dark: #0F172A;
            --darker: #020617;
            --light: #F8FAFC;
            --whatsapp: #25D366;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--darker);
            color: var(--light);
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6, .brand-text {
            font-family: 'Poppins', sans-serif;
        }

        .glass-card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s ease;
        }

        .input-premium {
            background-color: rgba(30, 41, 59, 0.5) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #fff !important;
            border-radius: 10px;
            padding: 12px 15px;
        }

        .input-premium:focus {
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.3) !important;
            border-color: var(--primary) !important;
        }

        .btn-whatsapp {
            background-color: var(--whatsapp);
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 10px 20px;
            border: none;
            transition: all 0.3s;
        }

        .btn-whatsapp:hover {
            background-color: #1DA851;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.4);
        }

        .qr-container {
            background: white;
            padding: 20px;
            border-radius: 16px;
            display: inline-block;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        .qr-container img {
            max-width: 250px;
            border-radius: 8px;
        }

        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .status-connected {
            background-color: rgba(16, 185, 129, 0.2);
            color: #34D399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-disconnected {
            background-color: rgba(239, 68, 68, 0.2);
            color: #F87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .pulse {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .pulse.connected {
            background: #34D399;
            box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7);
            animation: pulse-green 2s infinite;
        }

        .pulse.disconnected {
            background: #F87171;
        }

        @keyframes pulse-green {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(52, 211, 153, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.5);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 5px;
            font-family: 'Poppins', sans-serif;
        }
        
        .loader-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.8);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    
    <div class="loader-overlay" id="loading-overlay" style="display: none;">
        <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <div class="container py-5">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <a href="/" class="btn btn-outline-secondary rounded-circle me-3" style="width: 40px; height: 40px; padding: 7px;">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h2 class="fw-bold d-inline align-middle"><i class="bi bi-whatsapp text-whatsapp me-2"></i> WhatsApp Gateway</h2>
            </div>
        </div>

        <div class="row g-4">
            <!-- Connection Status Card -->
            <div class="col-lg-5">
                <div class="glass-card h-100 text-center d-flex flex-column justify-content-center align-items-center">
                    
                    <div id="status-container" class="mb-4">
                        <div class="status-badge status-disconnected" id="conn-badge">
                            <div class="pulse disconnected" id="conn-pulse"></div>
                            <span id="conn-text">Disconnected</span>
                        </div>
                    </div>

                    <!-- QR Section -->
                    <div id="qr-section" class="mb-4">
                        <p class="text-secondary mb-3">Scan this QR code with your WhatsApp app to link the device.</p>
                        <div class="qr-container">
                            <img id="qr-img" src="" alt="QR Code" style="display: none;">
                            <div id="qr-loading" class="py-5 text-secondary">
                                <div class="spinner-border spinner-border-sm me-2"></div> Generating QR...
                            </div>
                        </div>
                    </div>

                    <!-- Connected Info Section -->
                    <div id="profile-section" class="mb-4 w-100" style="display: none;">
                        <div class="d-flex flex-column align-items-center">
                            <div class="bg-primary bg-opacity-25 rounded-circle d-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
                                <i class="bi bi-person-fill text-primary" style="font-size: 2.5rem;"></i>
                            </div>
                            <h4 class="fw-bold mb-1" id="profile-name">-</h4>
                            <p class="text-secondary mb-3" id="profile-phone">-</p>
                            
                            <div class="bg-dark rounded-3 p-3 w-100 text-start border border-secondary border-opacity-25 mb-4">
                                <div class="small text-secondary mb-1">Last Connected</div>
                                <div class="fw-medium" id="last-connected">-</div>
                            </div>
                            
                            <button class="btn btn-outline-danger w-100 py-2 rounded-3" onclick="logoutWhatsApp()">
                                <i class="bi bi-box-arrow-right me-2"></i> Unlink Device
                            </button>
                        </div>
                    </div>

                </div>
            </div>

            <div class="col-lg-7">
                <!-- Stats Row -->
                <div class="row g-3 mb-4">
                    <div class="col-sm-6">
                        <div class="stat-card">
                            <div class="stat-value text-success" id="stat-sent">0</div>
                            <div class="text-secondary small fw-medium text-uppercase tracking-wide">Messages Sent</div>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <div class="stat-card">
                            <div class="stat-value text-danger" id="stat-failed">0</div>
                            <div class="text-secondary small fw-medium text-uppercase tracking-wide">Failed</div>
                        </div>
                    </div>
                </div>

                <!-- Test Message Card -->
                <div class="glass-card mb-4">
                    <h5 class="fw-bold mb-4"><i class="bi bi-send-fill text-primary me-2"></i> Send Test Message</h5>
                    <form id="test-msg-form" onsubmit="sendTestMessage(event)">
                        <div class="mb-3">
                            <label class="form-label text-secondary small fw-medium">Phone Number</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark border-secondary text-secondary"><i class="bi bi-telephone"></i></span>
                                <input type="tel" id="test-phone" class="form-control input-premium border-start-0" placeholder="e.g. 0771234567" required oninput="this.value = this.value.replace(/[^0-9+]/g, '')">
                            </div>
                        </div>
                        <button type="submit" class="btn btn-whatsapp w-100" id="btn-test">
                            <i class="bi bi-paperclip me-1"></i> Send Test WhatsApp
                        </button>
                    </form>
                </div>
                
                <!-- Recent Logs Card -->
                <div class="glass-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h5 class="fw-bold mb-0"><i class="bi bi-journal-text text-accent me-2"></i> Recent Logs</h5>
                        <button class="btn btn-sm btn-outline-secondary" onclick="fetchLogs()"><i class="bi bi-arrow-clockwise"></i></button>
                    </div>
                    <div class="table-responsive" style="max-height: 250px; overflow-y: auto;">
                        <table class="table table-dark table-hover mb-0" style="background: transparent;">
                            <thead>
                                <tr>
                                    <th class="text-secondary fw-normal small border-bottom-0">Time</th>
                                    <th class="text-secondary fw-normal small border-bottom-0">Phone</th>
                                    <th class="text-secondary fw-normal small border-bottom-0">Status</th>
                                </tr>
                            </thead>
                            <tbody id="logs-body">
                                <tr><td colspan="3" class="text-center text-secondary py-3">No logs available</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Socket.IO -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/whatsapp.js"></script>
</body>
</html>
